<!-- Dashboard Sidebar Navigation -->
<aside id="dashboard-sidebar" class="hidden lg:flex flex-col w-64 min-h-[calc(100vh-4rem)] bg-white border-r border-gray-100">
    <!-- Restaurant Selector -->
    <div class="p-4 border-b border-gray-100">
        <label class="block text-xs text-gray-400 mb-1.5 font-medium uppercase tracking-wider">Restaurante</label>
        <select id="global-restaurant-select" onchange="DashboardNav.onRestaurantChange()" class="w-full px-3 py-2.5 rounded-xl bg-gray-50 border border-gray-200 text-gray-800 text-sm outline-none transition-colors">
            <option>Carregando...</option>
        </select>
    </div>

    <!-- Nav Links -->
    <nav class="flex-1 py-4 px-3 space-y-1">
        <a href="/dashboard/" data-page="overview" class="dash-nav-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm transition-all">
            <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
            <span>Visão Geral</span>
        </a>
        <a href="/dashboard/pedidos/" data-page="orders" class="dash-nav-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm transition-all">
            <i data-lucide="clipboard-list" class="w-4 h-4"></i>
            <span>Pedidos</span>
            <span id="sidebar-pending-badge" class="hidden ml-auto px-2 py-0.5 rounded-full bg-red-500 text-white text-xs font-bold animate-pulse">0</span>
        </a>
        <a href="/dashboard/produtos/" data-page="products" class="dash-nav-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm transition-all">
            <i data-lucide="package" class="w-4 h-4"></i>
            <span>Produtos</span>
        </a>
        <a href="/dashboard/cupons/" data-page="coupons" class="dash-nav-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm transition-all">
            <i data-lucide="ticket" class="w-4 h-4"></i>
            <span>Cupons</span>
        </a>
        <a href="/dashboard/relatorios/" data-page="reports" class="dash-nav-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm transition-all">
            <i data-lucide="bar-chart-3" class="w-4 h-4"></i>
            <span>Relatórios</span>
        </a>

        <div class="pt-4 mt-4 border-t border-gray-100">
            <a href="/dashboard/configuracoes/" data-page="settings" class="dash-nav-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm transition-all">
                <i data-lucide="settings" class="w-4 h-4"></i>
                <span>Configurações</span>
            </a>
        </div>
    </nav>

    <!-- Restaurant Status -->
    <div class="p-4 border-t border-gray-100">
        <div id="sidebar-restaurant-status" class="flex items-center gap-2 text-xs">
            <div id="sidebar-status-dot" class="w-2 h-2 rounded-full bg-gray-400"></div>
            <span id="sidebar-status-text" class="text-gray-400">—</span>
        </div>
    </div>
</aside>

<!-- Mobile Bottom Nav -->
<nav id="dashboard-mobile-nav" class="lg:hidden fixed bottom-0 left-0 right-0 z-40 bg-white border-t border-gray-100 shadow-nav">
    <div class="flex items-center justify-around py-2">
        <a href="/dashboard/" data-page="overview" class="dash-mobile-link flex flex-col items-center gap-0.5 py-1 px-2 text-xs">
            <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
            <span>Início</span>
        </a>
        <a href="/dashboard/pedidos/" data-page="orders" class="dash-mobile-link flex flex-col items-center gap-0.5 py-1 px-2 text-xs relative">
            <i data-lucide="clipboard-list" class="w-5 h-5"></i>
            <span>Pedidos</span>
            <span id="mobile-pending-badge" class="hidden absolute -top-1 right-0 px-1.5 py-0.5 rounded-full bg-red-500 text-white text-[10px] font-bold animate-pulse">0</span>
        </a>
        <a href="/dashboard/produtos/" data-page="products" class="dash-mobile-link flex flex-col items-center gap-0.5 py-1 px-2 text-xs">
            <i data-lucide="package" class="w-5 h-5"></i>
            <span>Produtos</span>
        </a>
        <a href="/dashboard/cupons/" data-page="coupons" class="dash-mobile-link flex flex-col items-center gap-0.5 py-1 px-2 text-xs">
            <i data-lucide="ticket" class="w-5 h-5"></i>
            <span>Cupons</span>
        </a>
        <a href="/dashboard/configuracoes/" data-page="settings" class="dash-mobile-link flex flex-col items-center gap-0.5 py-1 px-2 text-xs">
            <i data-lucide="settings" class="w-5 h-5"></i>
            <span>Config</span>
        </a>
    </div>
</nav>

<style>
    .dash-nav-link { color: #6b7280; }
    .dash-nav-link:hover { background: #f9fafb; color: #374151; }
    .dash-nav-link.active { background: #fef2f2; color: #E53935; font-weight: 600; }
    .dash-mobile-link { color: #9ca3af; }
    .dash-mobile-link.active { color: #E53935; }
</style>

<script>
    const DashboardNav = {
        currentRestaurantId: null,
        restaurants: [],

        async init() {
            if (!Auth.isAuthenticated() || !Auth.isOwner()) {
                window.location.href = '/login/';
                return;
            }
            await this.loadRestaurants();
            this.highlightActive();
        },

        async loadRestaurants() {
            try {
                const res = await API.get('/api/restaurants/mine/');
                this.restaurants = await res.json();
                const select = document.getElementById('global-restaurant-select');
                if (!this.restaurants.length) {
                    select.innerHTML = '<option value="">Nenhum restaurante</option>';
                    this.currentRestaurantId = null;

                    // Dispatch event so pages can show a creation form
                    document.dispatchEvent(new CustomEvent('no-restaurants'));
                    return;
                }

                // Restore previously selected restaurant
                const savedId = localStorage.getItem('dashboard_restaurant_id');
                this.currentRestaurantId = savedId && this.restaurants.find(r => r.id === savedId)
                    ? savedId : this.restaurants[0].id;

                select.innerHTML = this.restaurants.map(r =>
                    `<option value="${r.id}" ${r.id === this.currentRestaurantId ? 'selected' : ''}>${r.nome}</option>`
                ).join('');

                localStorage.setItem('dashboard_restaurant_id', this.currentRestaurantId);

                // Update status indicator
                const current = this.restaurants.find(r => r.id === this.currentRestaurantId);
                if (current) this.updateStatusIndicator(current.status);

                // Dispatch event for page-specific loading
                document.dispatchEvent(new CustomEvent('restaurant-loaded', {
                    detail: { restaurantId: this.currentRestaurantId }
                }));
            } catch (e) {
                console.error('Failed to load restaurants:', e);
            }
        },

        onRestaurantChange() {
            const select = document.getElementById('global-restaurant-select');
            this.currentRestaurantId = select.value;
            localStorage.setItem('dashboard_restaurant_id', this.currentRestaurantId);

            const current = this.restaurants.find(r => r.id === this.currentRestaurantId);
            if (current) this.updateStatusIndicator(current.status);

            document.dispatchEvent(new CustomEvent('restaurant-changed', {
                detail: { restaurantId: this.currentRestaurantId }
            }));
        },

        updateStatusIndicator(st) {
            const dot = document.getElementById('sidebar-status-dot');
            const text = document.getElementById('sidebar-status-text');
            if (!dot || !text) return;
            const map = {
                ativo: { color: 'bg-emerald-400', rotulo: 'Aberto' },
                inativo: { color: 'bg-gray-400', rotulo: 'Fechado' },
                suspenso: { color: 'bg-red-400', rotulo: 'Suspenso' },
            };
            const info = map[st] || map.inativo;
            dot.className = `w-2 h-2 rounded-full ${info.color}`;
            text.textContent = info.rotulo;
            text.className = st === 'ativo' ? 'text-emerald-500' : 'text-gray-400';
        },

        highlightActive() {
            const path = window.location.pathname;
            const pageMap = {
                '/dashboard/': 'overview',
                '/dashboard/pedidos/': 'orders',
                '/dashboard/produtos/': 'products',
                '/dashboard/configuracoes/': 'settings',
                '/dashboard/cupons/': 'coupons',
                '/dashboard/relatorios/': 'reports',
            };
            const activePage = pageMap[path] || 'overview';

            document.querySelectorAll('.dash-nav-link').forEach(link => {
                link.classList.toggle('active', link.dataset.page === activePage);
            });
            document.querySelectorAll('.dash-mobile-link').forEach(link => {
                link.classList.toggle('active', link.dataset.page === activePage);
            });
        },

        getRestaurantId() {
            return this.currentRestaurantId;
        },
    };
</script>
