{% extends "base.html" %}
{% block title %}Carrinho — Cardápio Online{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <h1 class="text-2xl font-bold text-gray-800 mb-6 flex items-center gap-3">
        <i data-lucide="shopping-bag" class="w-6 h-6 text-red-500"></i> Carrinho
    </h1>

    <!-- Empty Cart -->
    <div id="cart-empty" class="hidden text-center py-20 bg-white rounded-2xl border border-gray-100 shadow-card">
        <i data-lucide="shopping-bag" class="w-16 h-16 text-gray-300 mx-auto mb-4"></i>
        <h3 class="text-xl font-semibold text-gray-700 mb-2">Seu carrinho está vazio</h3>
        <p class="text-gray-500 mb-6">Adicione itens de um restaurante para começar.</p>
        <a href="/restaurantes/" class="btn-primary px-6 py-3 rounded-xl text-sm text-white font-semibold inline-block">Ver Restaurantes</a>
    </div>

    <!-- Cart Content -->
    <div id="cart-content" class="hidden space-y-4">
        <div id="cart-items-container" class="space-y-6"></div>

        <!-- Total Geral -->
        <div class="bg-white rounded-2xl p-6 border border-gray-100 shadow-card">
            <div class="flex items-center justify-between mb-4">
                <span class="text-lg font-semibold text-gray-800">Total Geral</span>
                <span id="cart-total" class="text-2xl font-bold text-red-500">R$ 0,00</span>
            </div>
            <div class="flex gap-3">
                <button onclick="Cart.clear(); renderCart();" class="w-full py-3 rounded-xl border border-gray-200 text-gray-600 text-sm font-medium hover:bg-gray-50 transition-colors">Limpar Carrinho</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    function renderCart() {
        const cart = Cart.get();
        const empty = document.getElementById('cart-empty');
        const content = document.getElementById('cart-content');
        
        if (!cart.items || cart.items.length === 0) {
            empty.classList.remove('hidden');
            content.classList.add('hidden');
            return;
        }
        empty.classList.add('hidden');
        content.classList.remove('hidden');

        const rests = Cart.getRestaurants();
        let html = '';
        
        rests.forEach(r => {
            html += `
            <div class="bg-white rounded-2xl p-5 border border-gray-100 shadow-card">
                <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-4 pb-3 border-b border-gray-100 gap-3">
                    <p class="text-sm text-gray-500">Restaurante: <span class="text-red-500 font-semibold text-base">${r.nome}</span></p>
                    <a href="/checkout/?restaurant_id=${r.id}" class="btn-primary px-5 py-2.5 rounded-xl text-white text-sm font-semibold text-center sm:w-auto w-full">Finalizar Pedido</a>
                </div>
                <div class="space-y-3">
            `;
            
            html += r.items.map(item => {
                // Identificador único que considera os adicionais
                const itemId = item.uniqueId || item.product_id;
                
                return `
                <div class="bg-gray-50 rounded-xl p-4 flex items-center gap-4 fade-in">
                    <div class="w-16 h-16 rounded-lg bg-gray-200 overflow-hidden flex-shrink-0">
                        ${item.image_url ? `<img src="${item.image_url}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center"><i data-lucide="image" class="w-6 h-6 text-gray-400"></i></div>`}
                    </div>
                    <div class="flex-1 min-w-0">
                        <h4 class="font-bold text-gray-800 text-sm truncate">${item.nome}</h4>
                        
                        <!-- INCREMENTO: Exibição dos Adicionais Selecionados -->
                        ${item.extras && item.extras.length > 0 ? 
                            `<p class="text-[10px] text-gray-400 leading-tight mt-0.5">
                                <span class="font-semibold text-red-400">Adicionais:</span> 
                                ${item.extras.map(e => e.nome).join(', ')}
                            </p>` : ''
                        }

                        <p class="text-red-500 font-extrabold text-sm mt-1">${formatMoney(item.preco)}</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="Cart.updateQuantity('${itemId}', ${item.quantity - 1}); renderCart();" class="w-8 h-8 rounded-lg bg-white border border-gray-200 text-gray-600 flex items-center justify-center hover:bg-gray-50 transition-colors ${item.quantity <= 1 ? 'opacity-50' : ''}">-</button>
                        <span class="text-sm font-semibold text-gray-800 w-6 text-center">${item.quantity}</span>
                        <button onclick="Cart.updateQuantity('${itemId}', ${item.quantity + 1}); renderCart();" class="w-8 h-8 rounded-lg bg-white border border-gray-200 text-gray-600 flex items-center justify-center hover:bg-gray-50 transition-colors">+</button>
                    </div>
                    <button onclick="Cart.remove('${itemId}'); renderCart();" class="p-2 rounded-lg hover:bg-red-50 text-red-400 transition-colors">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                </div>
            `}).join('');
            
            const restTotal = Cart.getTotalByRestaurant(r.id);
            html += `
                </div>
                <div class="mt-5 pt-3 text-right">
                    <span class="text-sm text-gray-500">Subtotal deste restaurante:</span>
                    <span class="text-lg font-bold text-red-500 ml-2">${formatMoney(restTotal)}</span>
                </div>
            </div>
            `;
        });

        document.getElementById('cart-items-container').innerHTML = html;
        document.getElementById('cart-total').textContent = formatMoney(Cart.getTotal());
        lucide.createIcons();
    }
    renderCart();
</script>
{% endblock %}
