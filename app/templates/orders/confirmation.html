{% extends "base.html" %}
{% block title %}Pedido Confirmado — Cardápio Online{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto px-4 py-16 text-center fade-in">
    <div class="w-20 h-20 rounded-full bg-emerald-100 flex items-center justify-center mx-auto mb-6">
        <i data-lucide="check-circle-2" class="w-10 h-10 text-emerald-500"></i>
    </div>
    <h1 class="text-3xl font-bold text-gray-800 mb-3">Pedido Confirmado!</h1>
    <p class="text-gray-500 mb-2">Seu pedido foi enviado ao restaurante.</p>
    <div class="bg-white rounded-2xl p-6 mt-8 mb-8 border border-gray-100 shadow-card">
        <p class="text-sm text-gray-500 mb-1">Número do pedido</p>
        <p class="text-2xl font-bold text-red-500">{{ numero_pedido }}</p>
    </div>
    <div class="flex gap-3 justify-center">
        <a href="/pedido/{{ numero_pedido }}/acompanhar/" class="btn-primary px-6 py-3 rounded-xl text-sm text-white font-semibold">Acompanhar Pedido</a>
        <a href="/" class="px-6 py-3 rounded-xl border border-gray-200 text-gray-600 text-sm font-medium hover:bg-gray-50 transition-colors">Voltar ao Início</a>
    </div>
</div>
{% endblock %}
