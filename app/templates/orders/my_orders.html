{% extends "base.html" %}
{% block title %}Meus Pedidos — Cardápio Online{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <h1 class="text-2xl font-bold text-gray-800 mb-6 flex items-center gap-3">
        <i data-lucide="receipt" class="w-6 h-6 text-red-500"></i> Meus Pedidos
    </h1>
    <div id="orders-list" class="space-y-4">
        <!-- Skeleton Loading -->
        <div class="skeleton rounded-2xl h-24"></div>
        <div class="skeleton rounded-2xl h-24"></div>
    </div>
    <div id="orders-empty" class="hidden text-center py-20 bg-white rounded-2xl border border-gray-100 shadow-card">
        <i data-lucide="receipt" class="w-12 h-12 text-gray-300 mx-auto mb-3"></i>
        <p class="text-gray-500">Você ainda não fez nenhum pedido.</p>
        <a href="/restaurantes/" class="btn-primary px-6 py-3 rounded-xl text-sm text-white font-semibold inline-block mt-4">Ver Restaurantes</a>
    </div>
</div>

<!-- Review Modal -->
<div id="review-modal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeReviewModal()"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-md bg-white border border-gray-200 rounded-2xl shadow-2xl p-6">
        <h2 class="text-xl font-bold text-gray-800 mb-2">Avaliar Pedido</h2>
        <p class="text-sm text-gray-500 mb-6" id="review-restaurant-name"></p>
        <form id="review-form" class="space-y-4">
            <input type="hidden" id="review-order-id">
            <input type="hidden" id="review-restaurant-id">
            <div class="flex justify-center gap-2 mb-6" id="star-rating">
                <button type="button" class="star-btn w-10 h-10 text-gray-300 hover:text-amber-400 transition-colors" data-rating="1"><i data-lucide="star" class="w-full h-full fill-current"></i></button>
                <button type="button" class="star-btn w-10 h-10 text-gray-300 hover:text-amber-400 transition-colors" data-rating="2"><i data-lucide="star" class="w-full h-full fill-current"></i></button>
                <button type="button" class="star-btn w-10 h-10 text-gray-300 hover:text-amber-400 transition-colors" data-rating="3"><i data-lucide="star" class="w-full h-full fill-current"></i></button>
                <button type="button" class="star-btn w-10 h-10 text-gray-300 hover:text-amber-400 transition-colors" data-rating="4"><i data-lucide="star" class="w-full h-full fill-current"></i></button>
                <button type="button" class="star-btn w-10 h-10 text-gray-300 hover:text-amber-400 transition-colors" data-rating="5"><i data-lucide="star" class="w-full h-full fill-current"></i></button>
            </div>
            <input type="hidden" id="review-rating" value="0">
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">Comentário (opcional)</label>
                <textarea id="review-comment" rows="3" class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 text-gray-800 placeholder-gray-400 outline-none focus:bg-white text-sm resize-none" placeholder="Conte como foi sua experiência..."></textarea>
            </div>
            <div class="mt-6 flex gap-3">
                <button type="button" onclick="closeReviewModal()" class="flex-1 px-4 py-2.5 rounded-xl border border-gray-200 text-gray-600 hover:bg-gray-50 transition-colors">Cancelar</button>
                <button type="submit" id="btn-submit-review" class="flex-1 btn-primary px-4 py-2.5 rounded-xl text-white font-medium">Enviar Avaliação</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    const statusLabels = { pendente: 'Pendente', confirmado: 'Confirmado', preparando: 'Preparando', pronto: 'Pronto', entregue: 'Entregue', cancelado: 'Cancelado' };
    const statusBg = { pendente: 'bg-amber-100 text-amber-700', confirmado: 'bg-blue-100 text-blue-700', preparando: 'bg-violet-100 text-violet-700', pronto: 'bg-emerald-100 text-emerald-700', entregue: 'bg-emerald-100 text-emerald-700', cancelado: 'bg-red-100 text-red-700' };

    async function loadOrders() {
        if (!Auth.isAuthenticated()) { window.location.href = '/login/'; return; }
        try {
            const res = await API.get('/api/orders/');
            const data = await res.json();
            const list = document.getElementById('orders-list');
            const empty = document.getElementById('orders-empty');
            
            if (!data.results || data.results.length === 0) { 
                list.innerHTML = ''; 
                empty.classList.remove('hidden'); 
                return; 
            }
            
            empty.classList.add('hidden');
            list.innerHTML = data.results.map(o => `
                <div class="bg-white rounded-2xl p-5 card-hover fade-in border border-gray-100 shadow-card">
                    <a href="/pedido/${o.numero_pedido}/acompanhar/" class="flex items-center justify-between block mb-4">
                        <div>
                            <p class="text-sm font-bold text-red-500">${o.numero_pedido}</p>
                            <div class="mt-1 space-y-0.5">
                                ${o.itens.map(i => `
                                    <p class="text-[10px] text-gray-500">
                                        <span class="font-bold">${i.quantidade}x</span> ${i.nome}
                                        ${i.extras && i.extras.length > 0 ? 
                                            `<span class="text-red-400 italic font-medium"> (+ ${i.extras.map(e => e.nome).join(', ')})</span>` 
                                            : ''
                                        }
                                    </p>
                                `).join('')}
                            </div>
                            <p class="text-xs font-bold text-gray-700 mt-2">Total: ${formatMoney(o.total)}</p>
                            <p class="text-[10px] text-gray-400 mt-1">${new Date(o.criado_em).toLocaleDateString('pt-BR')} às ${new Date(o.criado_em).toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})}</p>
                        </div>
                        <span class="px-3 py-1 rounded-lg text-xs font-semibold ${statusBg[o.status]}">${statusLabels[o.status]}</span>
                    </a>
                    <div class="flex gap-2 pt-4 border-t border-gray-100">
                        <button onclick="reorder('${o.restaurante_id}', '${o.restaurante_nome}', ${JSON.stringify(o.itens).replace(/"/g, '&quot;')})" class="flex-1 px-3 py-2 rounded-xl bg-gray-50 hover:bg-gray-100 text-gray-700 text-xs font-medium transition-colors flex items-center justify-center gap-2 border border-gray-200">
                            <i data-lucide="rotate-cw" class="w-4 h-4"></i> Refazer Pedido
                        </button>
                        ${o.status === 'entregue' ? `
                        <button onclick="openReviewModal('${o.id}', '${o.restaurante_id}', '${o.restaurante_nome}')" class="flex-1 px-3 py-2 rounded-xl border border-red-200 text-red-500 hover:bg-red-50 text-xs font-medium transition-colors flex items-center justify-center gap-2">
                            <i data-lucide="star" class="w-4 h-4"></i> Avaliar
                        </button>` : ''}
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        } catch (e) { 
            console.error(e);
            document.getElementById('orders-list').innerHTML = '<p class="text-red-500 text-center">Erro ao carregar pedidos.</p>'; 
        }
    }
    
    // Lógica de Avaliação (Estrelas)
    document.querySelectorAll('.star-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const rating = parseInt(btn.dataset.rating);
            document.getElementById('review-rating').value = rating;
            document.querySelectorAll('.star-btn').forEach(b => {
                const r = parseInt(b.dataset.rating);
                if (r <= rating) { b.classList.add('text-amber-400'); b.classList.remove('text-gray-300'); }
                else { b.classList.add('text-gray-300'); b.classList.remove('text-amber-400'); }
            });
        });
    });

    function openReviewModal(orderId, restaurantId, restaurantName) {
        document.getElementById('review-order-id').value = orderId;
        document.getElementById('review-restaurant-id').value = restaurantId;
        document.getElementById('review-restaurant-name').textContent = restaurantName;
        document.getElementById('review-modal').classList.remove('hidden');
    }

    function closeReviewModal() {
        document.getElementById('review-modal').classList.add('hidden');
        document.getElementById('review-form').reset();
        document.getElementById('review-rating').value = 0;
        document.querySelectorAll('.star-btn').forEach(b => { b.classList.add('text-gray-300'); b.classList.remove('text-amber-400'); });
    }

    document.getElementById('review-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const rating = document.getElementById('review-rating').value;
        if (rating == 0) { showToast('Por favor, selecione uma nota de 1 a 5 estrelas.', 'warning'); return; }
        const btn = document.getElementById('btn-submit-review');
        btn.textContent = 'Enviando...'; btn.disabled = true;
        try {
            const res = await API.post('/api/reviews/', { 
                pedido_id: document.getElementById('review-order-id').value, 
                restaurante_id: document.getElementById('review-restaurant-id').value, 
                nota: parseInt(rating), 
                comentario: document.getElementById('review-comment').value.trim() 
            });
            if (res.ok) { showToast('Avaliação enviada com sucesso!'); closeReviewModal(); }
            else { const err = await res.json(); showToast(err.error || 'Erro ao enviar avaliação.', 'error'); }
        } catch (e) { showToast('Erro de conexão.', 'error'); }
        finally { btn.textContent = 'Enviar Avaliação'; btn.disabled = false; }
    });

    /**
     * Refaz o pedido injetando novamente os itens e seus extras no carrinho.
     */
    function reorder(restaurantId, restaurantName, items) {
        // Opcional: Limpar o carrinho antes ou apenas adicionar os itens?
        // Aqui limpamos para garantir que o pedido seja identico ao antigo
        Cart.clear();

        items.forEach(i => {
            const extras = i.extras || [];
            
            // LÓGICA DE PREÇO: 
            // Se i.preco já é o preço unitário final (Base + Extras), 
            // precisamos subtrair os extras para mandar o Preço Base correto para o Cart.add,
            // pois o Cart.add vai somar os extras novamente.
            const extrasTotal = extras.reduce((sum, e) => sum + parseFloat(e.preco || 0), 0);
            const unitPriceFromOrder = parseFloat(i.preco);
            const precoBaseOriginal = unitPriceFromOrder - extrasTotal;

            const baseProduct = { 
                id: i.produto_id, 
                nome: i.nome, 
                preco: precoBaseOriginal, 
                imagem_url: i.imagem_url 
            };
            
            // Adiciona ao carrinho com os extras (o Cart.add vai calcular o unitPrice correto)
            Cart.add(baseProduct, restaurantId, restaurantName, extras);
            
            // Se a quantidade era maior que 1, atualizamos no carrinho usando o UniqueID
            const qty = i.quantidade || i.quantity || 1;
            if (qty > 1) {
                const extrasKey = extras.map(e => e.nome).sort().join('|');
                const uniqueId = extrasKey ? `${i.produto_id}-${extrasKey}` : i.produto_id;
                Cart.updateQuantity(uniqueId, qty);
            }
        });

        showToast('Itens adicionados ao carrinho!');
        setTimeout(() => { window.location.href = '/carrinho/'; }, 800);
    }

    loadOrders();
</script>
{% endblock %}
