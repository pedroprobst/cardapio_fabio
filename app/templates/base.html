{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Cardápio Online — Plataforma multi-restaurantes para pedidos online">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>{% block title %}Cardápio Online{% endblock %}</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#fef2f2', 100: '#fee2e2', 200: '#fecaca', 300: '#fca5a5',
                            400: '#f87171', 500: '#E53935', 600: '#dc2626', 700: '#b91c1c',
                            800: '#991b1b', 900: '#7f1d1d',
                        },
                        surface: {
                            50: '#ffffff', 100: '#fafafa', 200: '#f5f5f5', 300: '#eeeeee',
                            400: '#e0e0e0', 500: '#bdbdbd', 600: '#9e9e9e',
                        },
                    },
                    fontFamily: { sans: ['Poppins', 'system-ui', 'sans-serif'] },
                    boxShadow: {
                        'card': '0 2px 12px rgba(0,0,0,0.06)',
                        'card-hover': '0 8px 30px rgba(0,0,0,0.1)',
                        'nav': '0 2px 20px rgba(0,0,0,0.06)',
                    },
                }
            }
        }
    </script>

    <!-- Google Fonts — Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

    <!-- Global CSS -->
    <link rel="stylesheet" href="{% static 'css/custom.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body class="min-h-screen flex flex-col">
    {% include "partials/_navbar.html" %}

    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-20 right-4 z-50 space-y-2"></div>

    <main class="flex-1">
        {% block content %}{% endblock %}
    </main>

    {% include "partials/_footer.html" %}

    <!-- Global JS Scripts -->
    <script src="{% static 'js/modules/toast.js' %}"></script>
    <script src="{% static 'js/modules/auth.js' %}"></script>
    <script src="{% static 'js/modules/api.js' %}"></script>
    <script src="{% static 'js/modules/cart.js' %}?v=2"></script>
    <script src="{% static 'js/modules/money.js' %}"></script>
    <script src="{% static 'js/modules/cep.js' %}"></script>
    <script src="{% static 'js/app.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
